# Docker Compose for the EDA architecture
# Services included:
#  - mosquitto: MQTT broker (1883 + WebSocket 9001)
#  - broker: Apache Kafka broker
#  - mqtt_subscriber: bridges MQTT -> Kafka
#  - wearable_producer: produces wearable data to Kafka
#  - orchestrator: coordinates jobs/triggers; can start producer containers or send triggers
#  - kafka_consumer: consumes Kafka topics and writes to MongoDB
#  - mongo: MongoDB instance
#  - mongo-express: web UI for MongoDB
#  - redis: caching service
#  - backend: Flask backend service
#  - ngrok: exposes backend service to the internet
#
# Services, volumes and env files are relative to the compose file location (/home/claudia/eda-architecture).
# Use `docker compose up -d` to start and `docker compose down -v` to stop and remove volumes.

services:
  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    volumes:
      - ./configs/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./data/mosquitto:/mosquitto/data
      - ./log/mosquitto:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
    stdin_open: true
    tty: true
    restart: unless-stopped

  # MQTT Subscriber
  mqtt_subscriber:
    build: ./services/mqtt_kafka_bridge
    container_name: mqtt_subscriber
    depends_on:
      broker:
        condition: service_healthy
      mosquitto:
        condition: service_started
    env_file:
      - ./services/mqtt_kafka_bridge/.env
    tty: true
    stdin_open: true
    restart: unless-stopped

  # MQTT Publisher (Raspberry starter) --> activate it if is possible to use edge/publisher_extended
  #edge_command:
  #  build: ./edge
  #  container_name: edge_command
  #  env_file:
  #    - ./.env
  #  depends_on:
  #    mosquitto:
  #      condition: service_started
  #  tty: true
  #  stdin_open: true
  #  restart: unless-stopped

  # Kafka Broker
  broker:
    image: apache/kafka:latest
    container_name: broker
    hostname: broker
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OPTS: "-Djava.net.preferIPv4Stack=true"
    ports:
      - "9092:9092"
    volumes:
      - ./data/kafka_data:/var/lib/kafka/data
      - ./log/kafka:/var/lib/kafka/logs
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'" ]
      interval: 10s
      timeout: 5s
      retries: 20

  # Backend Service
  backend:
    container_name: backend
    build: ./services/backend
    env_file:
      - ./services/backend/.env
    restart: unless-stopped
    depends_on:
      broker:
        condition: service_healthy
    volumes:
      - ./data/backend:/app/data
    tty: true
    ports:
      - "5000:5000"
    stdin_open: true
    command: [ "gunicorn", "--bind", "0.0.0.0:5000", "--worker-class", "gevent", "wsgi:app" ]

  # MongoDB Service
  mongo:
    image: mongo:4.4
    restart: always
    container_name: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - ./data/mongo_db:/data/db
    ports:
      - 27017:27017

  # Mongo Express Service
  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    container_name: mongo_express
    environment:
      ME_CONFIG_MONGODB_URL: ${ME_CONFIG_MONGODB_URL}
      ME_CONFIG_BASICAUTH_ENABLED: ${ME_CONFIG_BASICAUTH_ENABLED}
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
    depends_on:
      - mongo

  # Fit Processor Service
  fit-processor:
    build: ./services/fit-processor
    container_name: fit-processor
    restart: unless-stopped
    ports:
      - 8080:8080
    tty: true
    stdin_open: true

  # Kafka Consumer Service
  kafka_consumer:
    build: ./services/kafka_consumer
    container_name: kafka_consumer
    env_file:
      - ./services/kafka_consumer/.env
    restart: unless-stopped
    depends_on:
      broker:
        condition: service_healthy
      mongo:
        condition: service_started
    tty: true
    stdin_open: true

  # Consumer COPY
  # Kafka Consumer Service
  kafka_consumer_copy:
    build: ./services/kafka_consumer_copy
    container_name: kafka_consumer_copy
    env_file:
      - ./services/kafka_consumer_copy/.env
    restart: unless-stopped
    depends_on:
      broker:
        condition: service_healthy
      mongo:
        condition: service_started
    tty: true
    stdin_open: true

  # User Presence Service
  user_presence:
    build: ./services/user_presence_prod
    container_name: user_presence
    env_file:
      - ./services/kafka_orchestrator/.env
    restart: unless-stopped
    depends_on:
      broker:
        condition: service_healthy
    tty: true
    stdin_open: true

  # Orchestrator Service
  orchestrator:
    build: ./services/kafka_orchestrator
    container_name: orchestrator
    env_file:
      - ./services/kafka_orchestrator/.env
    restart: unless-stopped
    depends_on:
      broker:
        condition: service_healthy
      cache:
        condition: service_started
    tty: true
    stdin_open: true
    volumes:
      - ./data/backend:/app/data
      - ./data/orchestrator:/app/orchestrator_data

  # Cache Service (Redis)
  cache:
    image: redis:latest
    container_name: cache
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  # Ngrok Service to expose URL
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "backend:5000"
      - "--domain=${NGROK_DOMAIN}"
      - "--log=stdout"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4040:4040"

# Custom network for the EDA architecture
networks:
  default:
    name: eda_network
