# Listener MQTT
listener 1883 0.0.0.0

# Listener WebSocket
listener 9001 0.0.0.0
protocol websockets

# Data persistence
persistence true
persistence_file mosquitto.db
persistence_location /mosquitto/data/

# Authentication
allow_anonymous true
# allow_anonymous false
# password_file /mosquitto/config/pwfile do it later
# if you do it create pwfile  
